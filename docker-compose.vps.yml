services:
  pb_lms:
    image: spectado/pocketbase:latest
    container_name: pb_lms
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - pocketbase_data:/pb/pb_data

  lms:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_B2_CDN_URL: ${NEXT_PUBLIC_B2_CDN_URL:-}
    container_name: lms
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - pb_lms
    env_file:
      - .env
    environment:
      POCKETBASE_URL: ${POCKETBASE_PUBLIC_URL:-https://api.limarise.com/lms}

volumes:
  pocketbase_data:
