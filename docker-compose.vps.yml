services:
  pb_lms:
    image: spectado/pocketbase:latest
    container_name: pb_lms
    restart: unless-stopped
    expose:
      - "8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    command:
      - /pb/pocketbase
      - serve
      - --http=0.0.0.0:8090
      - --dir=/pb/pb_data
      - --url=${POCKETBASE_PUBLIC_URL:-https://api.limarise.com/lms}

  lms:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_B2_CDN_URL: ${NEXT_PUBLIC_B2_CDN_URL:-}
    container_name: lms
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - pb_lms
    env_file:
      - .env
    environment:
      POCKETBASE_URL: ${POCKETBASE_URL:-https://api.limarise.com/lms}

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - lms
      - pb_lms
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pocketbase_data:
  caddy_data:
  caddy_config:
